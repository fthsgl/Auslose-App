<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hauptmenü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Willkommen zur Lehrerhilfe</h1>
    
    <!-- Main Menu -->
    <div id="mainMenu">
      <button onclick="navigate('gruppenauslosung')">Gruppenauslosung</button>
      <button onclick="navigate('gluecksrad')">Glücksrad</button>
    </div>

    <!-- Add Participants -->
    <h3>Neue Teilnehmer hinzufügen</h3>
    <form id="studentForm">
      <input type="text" id="studentName" placeholder="Name des Teilnehmers" required>
      <button type="submit">Hinzufügen</button>
    </form>
    <ul id="studentList"></ul>

    <!-- Add Questions -->
    <h3>Neue Frage hinzufügen</h3>
    <form id="questionForm">
      <textarea id="questionText" placeholder="Frage eingeben" required></textarea>
      <button type="submit">Hinzufügen</button>
    </form>
    <ul id="questionList"></ul>

    <!-- Data Management -->
    <div class="data-management">
      <button onclick="resetAllData()">Alle Daten zurücksetzen</button>
      <button onclick="exportData()">Daten exportieren</button>
      <button onclick="importData()">Daten importieren</button>
      <input type="file" id="importFile" style="display: none;" accept="application/json" onchange="handleFileUpload(event)">
    </div>
  </div>

  <!-- JavaScript -->
  <script src="app.js"></script>
</body>
</html>
