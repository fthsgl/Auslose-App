<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hauptmenü</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Willkommen ! </h1>
    
    <!-- Main Menu -->
    <div id="mainMenu">
      <button onclick="navigate('gruppenauslosung')">Gruppenauslosung</button>
      <button onclick="navigate('gluecksrad')">Glücksrad</button>
      <button onclick="navigate('manage')">Liste verwalten</button> <!-- New Button -->
    </div>

    <!-- Add Participants Section -->
    <h3>Schüler hinzufügen</h3>
    <form id="studentForm">
      <input type="text" id="studentName" placeholder="Name des Schülers" required>
      <button type="submit">Hinzufügen</button>
    </form>
    <ul id="studentList"></ul>

    <!-- Add Questions Section -->
    <h3>Neue Frage hinzufügen</h3>
    <form id="questionForm">
      <textarea id="questionText" placeholder="Frage eingeben" required></textarea>
      <button type="submit">Hinzufügen</button>
    </form>
    <ul id="questionList"></ul>

    <!-- Reset Data -->
    <button onclick="resetAllData()">Alle Daten zurücksetzen</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
